name: Deploy to GitHub Pages

# Runs on every push to the main branch, and can be triggered manually.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions GitHub Pages needs to publish the built site.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; don't cancel a running one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
